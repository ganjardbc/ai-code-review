services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: node dist/presentation/web/server.js
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - WORKSPACE_DIR=/workspace
    volumes:
      - workspace:/workspace
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: node dist/worker.js
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - WORKSPACE_DIR=/workspace
      - WORKER_CONCURRENCY=3
    volumes:
      - workspace:/workspace
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  workspace:
